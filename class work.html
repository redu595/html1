
<!DOCTYPE html>
<html>
<head>
    <title>Grade Checker</title>
</head>
<body>

<script>
    var mark = 40;

    if (mark >= 90 && mark <= 100) {
        document.write("Grade A");
    }
    else if (mark >= 80 && mark < 90) {
        document.write("Grade B");
    }
    else {
        document.write("Grade C,d,f");
    }
</script>

</body>
</html>
