<!DOCTYPE html>
<html>
<head>
<style>
.header {
    background: #333;
    color: white;
    padding: 20px;
}

.link-box {
    border: 3px solid #4CAF50;
    padding: 15px;
    margin: 20px;
}

.link-box a {
    color: blue;
    text-decoration: none;
}

ol, ul {
    list-style: none;
}

ol li {
    color: darkred;
}

ul li {
    color: darkblue;
}
</style>
</head>
<body>

<div class="header">
    <h1>My Website</h1>
</div>

<div class="link-box">
    <a href="#">Click Me</a>

    <ol>
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
    </ol>

    <ul>
        <li>Red</li>
        <li>Green</li>
        <li>Blue</li>
    </ul>
</div>

</body>
</html>
